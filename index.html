        .top-2 { color: #c0c0c0; font-size: 1.1em; }

        .rank-bar-bg { flex-grow: 1; background-color: #333; height: 24px; border-radius: 4px; margin: 0 15px; overflow: hidden; }
        .rank-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: width 1s ease-in-out; }
        .highlight-bar { background: linear-gradient(90deg, #FDC830 0%, #F37335 100%); }
        .rank-value { width: 60px; text-align: right; font-size: 12px; color: #aaa; }
        .note-text { margin-top: 20px; font-size: 12px; color: #666; border-top: 1px solid #333; padding-top: 10px; line-height: 1.5; }
        .icon-note { display: inline-block; width: 14px; height: 14px; background: #666; color: #fff; border-radius: 50%; text-align: center; line-height: 14px; font-size: 10px; margin-left: 5px; cursor: help; }

        /* 兽聚日历 */

        .con-list { list-style: none; padding: 0; margin: 0; }

        .con-list li:last-child { border-bottom: none; }
        .con-date { background: #00a1d6; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 15px; min-width: 40px; text-align: center; }

            'home-title': { zh: '欢迎来到新福瑞Wiki！', 'zh-tw': '歡迎來到新福瑞Wiki！', en: 'Welcome to the New FurryWiki!' },

            'tab-game': { zh: '🎮 福瑞游戏', 'zh-tw': '🎮 福瑞遊戲', en: '🎮 Furry Games' },
            'calendar-title': { zh: '全球兽聚日历 (Furry Con Calendar)', 'zh-tw': '全球獸聚日曆 (Furry Con Calendar)', en: 'Global Furry Convention Calendar' },

            'ranking-title': { zh: '兽圈/泛兽类主播热度 TOP 20', 'zh-tw': '獸圈/泛獸類主播熱度 TOP 20', en: 'Furry/Pan-Furry Streamer Popularity TOP 20' },
            'ranking-note': { zh: '* 数据来源：网络统计（截止至2026年5月）。<br>* 特别说明：榜单第1名“碧月狐”虽然拥有极高的相关话题热度，但作者本人已声明不属于兽迷（Furry）圈子。本榜单将其列入旨在客观反映当前泛兽类内容的流量分布，不代表对其身份的定义。<br>* 如有数据遗漏或更新，欢迎联系站长。',
                'zh-tw': '* 數據來源：網路統計（截止至2026年5月）。<br>* 特別說明：榜單第1名「碧月狐」雖然擁有極高的相關話題熱度，但作者本人已聲明不屬於獸迷（Furry）圈子。本榜單將其列入旨在客觀反映當前泛獸類內容的流量分佈，不代表對其身分的定義。<br>* 如有數據遺漏或更新，歡迎聯繫站長。',

            // Furry 词条正文（完整三语）
            'intro-text': {
                zh: `
                    <h1>Furry (兽迷文化)</h1>
                    <p><strong>Furry</strong>（英文形容词，意为“毛茸茸的”），在中文语境下常被称为<strong>兽迷</strong>、<strong>福瑞</strong>或<strong>furry控</strong>。虽然从字面上看，该词源于对“动物毛皮”的描述，但在现代亚文化语境中，它已经演变为一个基于拟人化动物角色的庞大兴趣社群。</p>
                    <p>作为一个去中心化的泛爱好者群体，Furry不仅仅指代“有毛皮的生物”，更涵盖了从爬行类、水生生物到幻想生物的广泛拟人化创作。其核心在于对具有人类特质（如智慧、情感、社会性）的动物形象的兴趣，并通过艺术、文学、角色扮演等形式进行表达。</p>
                    <h2>常见误区与正名</h2>
                    <p>由于语言隔阂与望文生义，国内部分爱好者对Furry存在刻板印象，需予以厘清：</p>
                    <h3>误区一：“Furry必须是毛茸茸的”</h3>
                    <div class="highlight-box"><p><strong>事实：</strong>这是一个基于字面意思的误解。虽然哺乳动物是主流，但Furry文化早在80年代确立时就不排斥无毛生物。爬行类（Scalies）、水生类甚至昆虫类的拟人角色，只要具备拟人化特征，均属于Furry范畴。“是否毛茸茸”在审美观中从来都是可选元素。</p></div>
                    <h3>误区二：“只有直立行走的‘人形兽’才算”</h3>
                    <div class="highlight-box"><p><strong>事实：</strong>拥有类人躯干、直立行走的角色在英文中称为 <strong>Anthro</strong>，这只是Furry的一种主流形态。保留四足行走形态但拥有人类智慧的 <strong>Feral</strong>，以及半人半兽的 <strong>Taur</strong> 等形态，同样是Furry文化的重要组成部分。</p></div>
                    <h2>历史溯源与定义演变</h2>
                    <p>Furry作为一种独立文化，通常被认为形成于1980年代中期。</p>
                    <p><strong>术语起源：</strong>根据记载，“Furry”一词作为群体称呼的流行，与1986年圣地亚哥第39届“西海岸科幻奇幻大会”有关。当时圈外人士 Dr. Pepper 撰写的《Furry Fandom Observed》一文在BBS上流传，文中指出虽然人们喜欢的动物大多是哺乳动物（因此有Furry一词），但这并不排除对其他动物的喜爱。</p>
                    <p><strong>文化独立性：</strong>Furry是基于拟人动物这一表现形式于1983年左右独立的现代文化。虽然它与早期的Funny Animals漫画潮流有渊源，但它拥有明确的社群结构和独特的图腾表达，不同于单纯的商业漫画受众。</p>
                    <h2>文化边界与自我认同</h2>
                    <p>Furry是一个包容性极强的概念，但在实际应用中，需要尊重创作者的自我定义以及社群参与的差异：</p>
                    <h3>尊重创作者的自我定义（OC与自设）</h3>
                    <p>在中国现代创作环境中，许多画师或创作者虽然绘制了符合Furry定义的原创角色（OC）或自设，但如果创作者本人不承认自己是福瑞，或者根本不知道“福瑞”这一概念（例如B站的纪夫Junly老师、Faith不是Fish老师等），那么在严谨的分类上，不应强行将其归类为Furry作品或作者。这种情况下，应尊重其原本的创作意图（如单纯的角色设计、神话重构等），避免过度标签化。</p>
                    <h3>“是福瑞”不等于“混福瑞圈”</h3>
                    <p>Furry既是一种文化标签，也是一种社交圈子，二者可以剥离。</p>
                    <ul><li>有些创作者或爱好者虽然在审美和身份认同上完全属于Furry（例如B站的碧月狐老师），但他们可能选择不进入核心的社交圈子，不参与兽展、群组交流等典型的“混圈”行为。</li><li>这类人群依然是Furry文化的一部分，但他们的存在形式更加独立。因此，不能简单地用“是否活跃于圈子”来判断一个人或作品是否属于Furry。</li></ul>
                `,
                'zh-tw': `
                    <h1>Furry (獸迷文化)</h1>
                    <p><strong>Furry</strong>（英文形容詞，意為「毛茸茸的」），在中文語境下常被稱為<strong>獸迷</strong>、<strong>福瑞</strong>或<strong>furry控</strong>。雖然從字面上看，該詞源於對「動物毛皮」的描述，但在現代次文化語境中，它已經演變為一個基於擬人化動物角色的龐大興趣社群。</p>
                    <p>作為一個去中心化的泛愛好者群體，Furry不僅僅指代「有毛皮的生物」，更涵蓋了從爬行類、水生生物到幻想生物的廣泛擬人化創作。其核心在於對具有人類特質（如智慧、情感、社會性）的動物形象的興趣，並透過藝術、文學、角色扮演等形式進行表達。</p>
                    <h2>常見誤區與正名</h2>
                    <p>由於語言隔閡與望文生義，國內部分愛好者對Furry存在刻板印象，需予以釐清：</p>
                    <h3>誤區一：「Furry必須是毛茸茸的」</h3>
                    <div class="highlight-box"><p><strong>事實：</strong>這是一個基於字面意思的誤解。雖然哺乳動物是主流，但Furry文化早在80年代確立時就不排斥無毛生物。爬行類（Scalies）、水生類甚至昆蟲類的擬人角色，只要具備擬人化特徵，均屬於Furry範疇。「是否毛茸茸」在審美觀中從來都是可選元素。</p></div>
                    <h3>誤區二：「只有直立行走的『人形獸』才算」</h3>
                    <div class="highlight-box"><p><strong>事實：</strong>擁有類人軀幹、直立行走的角色在英文中稱為 <strong>Anthro</strong>，這只是Furry的一種主流形態。保留四足行走形態但擁有人類智慧的 <strong>Feral</strong>，以及半人半獸的 <strong>Taur</strong> 等形態，同樣是Furry文化的重要組成部分。</p></div>
                    <h2>歷史溯源與定義演變</h2>
                    <p>Furry作為一種獨立文化，通常被認為形成於1980年代中期。</p>
                    <p><strong>術語起源：</strong>根據記載，「Furry」一詞作為群體稱呼的流行，與1986年聖地亞哥第39屆「西海岸科幻奇幻大會」有關。當時圈外人士 Dr. Pepper 撰寫的《Furry Fandom Observed》一文在BBS上流傳，文中指出雖然人們喜歡的動物大多是哺乳動物（因此有Furry一詞），但這並不排除對其他動物的喜愛。</p>
                    <p><strong>文化獨立性：</strong>Furry是基於擬人動物這一表現形式於1983年左右獨立的現代文化。雖然它與早期的Funny Animals漫畫潮流有淵源，但它擁有明確的社群結構和獨特的圖騰表達，不同於單純的商業漫畫受眾。</p>
                    <h2>文化邊界與自我認同</h2>
                    <p>Furry是一個包容性極強的概念，但在實際應用中，需要尊重創作者的自我定義以及社群參與的差異：</p>
                    <h3>尊重創作者的自我定義（OC與自設）</h3>
                    <p>在中國現代創作環境中，許多畫師或創作者雖然繪製了符合Furry定義的原創角色（OC）或自設，但如果創作者本人不承認自己是福瑞，或者根本不知道「福瑞」這一概念（例如B站的紀夫Junly老師、Faith不是Fish老師等），那麼在嚴謹的分類上，不應強行將其歸類為Furry作品或作者。這種情況下，應尊重其原本的創作意圖（如單純的角色設計、神話重構等），避免過度標籤化。</p>
                    <h3>「是福瑞」不等於「混福瑞圈」</h3>
                    <p>Furry既是一種文化標籤，也是一種社交圈子，二者可以剝離。</p>
                    <ul><li>有些創作者或愛好者雖然在審美和身分認同上完全屬於Furry（例如B站的碧月狐老師），但他們可能選擇不進入核心的社交圈子，不參與獸展、群組交流等典型的「混圈」行為。</li><li>這類人群依然是Furry文化的一部分，但他們的存在形式更加獨立。因此，不能簡單地用「是否活躍於圈子」來判斷一個人或作品是否屬於Furry。</li></ul>
                `,
                en: `
                    <h1>Furry (Furry Fandom)</h1>
                    <p><strong>Furry</strong> (English adjective meaning "covered with fur") is often referred to in Chinese as <strong>兽迷</strong> (animal fans), <strong>福瑞</strong> (a phonetic translation), or <strong>furry控</strong>. Although the term literally derives from "animal fur," in modern subcultural contexts it has evolved into a large interest community based on anthropomorphic animal characters.</p>
                    <p>As a decentralized fan group, Furry does not only refer to "furred creatures" but encompasses a wide range of anthropomorphic creations from reptiles, aquatic life, to fantasy beings. The core lies in an interest in animal images with human traits (such as intelligence, emotion, sociality), expressed through art, literature, role-playing, and more.</p>
                    <h2>Common Misconceptions & Clarification</h2>
                    <p>Due to language barriers and literal interpretations, some Chinese enthusiasts have stereotypes about Furry. Here are clarifications:</p>
                    <h3>Misconception 1: "Furry must be furry"</h3>
                    <div class="highlight-box"><p><strong>Fact:</strong> This is a misconception based on the literal meaning. Although mammals are mainstream, Furry culture has never excluded hairless creatures since its establishment in the 1980s. Reptilian (Scalies), aquatic, and even insect anthropomorphic characters are all part of Furry, as long as they possess anthropomorphic features. "Furry" has always been an optional aesthetic element.</p></div>
                    <h3>Misconception 2: "Only bipedal 'human-animals' count"</h3>
                    <div class="highlight-box"><p><strong>Fact:</strong> Characters with human-like torsos and bipedal walking are called <strong>Anthro</strong> in English, which is just one mainstream form of Furry. <strong>Feral</strong> characters that retain quadrupedal walking but possess human intelligence, and <strong>Taur</strong> (centaur-like) forms are also important parts of Furry culture.</p></div>
                    <h2>Historical Origins & Definition Evolution</h2>
                    <p>Furry as an independent culture is generally considered to have formed in the mid-1980s.</p>
                    <p><strong>Term Origin:</strong> According to records, the term "Furry" as a group name became popular around the 39th "West Coast Science Fiction and Fantasy Convention" in San Diego in 1986. An outsider, Dr. Pepper, wrote an article "Furry Fandom Observed" that circulated on BBS, pointing out that although people's favorite animals are mostly mammals (hence the term Furry), this does not exclude affection for other animals.</p>
                    <p><strong>Cultural Independence:</strong> Furry is a modern culture that became independent around 1983 based on the expression of anthropomorphic animals. Although it has roots in earlier Funny Animals comic trends, it has a clear community structure and unique totemic expressions, distinct from mere commercial comic audiences.</p>
                    <h2>Cultural Boundaries & Self-Identity</h2>
                    <p>Furry is an inclusive concept, but in practice, creators' self-definitions and differences in community participation must be respected:</p>
                    <h3>Respecting Creators' Self-Definition (OC & Fursona)</h3>
                    <p>In modern Chinese creative environments, many artists or creators may draw original characters (OC) or fursonas that fit the definition of Furry. However, if the creator themselves do not acknowledge being Furry, or are unaware of the concept (e.g., Bilibili creators like Junly or Faith not Fish), then in strict classification, we should not forcibly label their works as Furry. In such cases, we should respect their original creative intent (e.g., pure character design, mythological reconstruction) and avoid over-labeling.</p>
                    <h3>"Being Furry" ≠ "Being in the Furry Circle"</h3>
                    <p>Furry is both a cultural label and a social circle; the two can be separated.</p>
                    <ul><li>Some creators or enthusiasts may fully belong to Furry in aesthetic and identity (e.g., Bilibili's Biyuehu), but they may choose not to enter the core social circles, not participate in conventions or group chats typical of "being in the circle."</li><li>These individuals are still part of Furry culture, but their existence is more independent. Therefore, one cannot simply judge whether a person or work belongs to Furry based on "whether active in the circle."</li></ul>
                `
            },

                    <h1 style="text-align:center;margin-bottom:30px;color:#2c3e50;">福瑞文化的起源</h1>
                    <p>福瑞（Furry），又称兽迷或兽圈，是指对具有人类智能、双足步行、穿着服装等人类属性的拟人化动物形象感兴趣的群体。在英语中，“Furry”一词最早可追溯至17世纪后期，原意为“覆有毛皮的”。直到20世纪80年代，它才在亚文化语境中延伸出拟人动物角色及爱好者的含义，并逐渐成为一种独特的文化认同。</p>
                    <p>福瑞文化的诞生，与20世纪中叶美国的社会环境及漫画产业变革息息相关。50年代末至60年代初，美国漫画杂志协会（CMAA）及《权威漫画准则》（CCA）先后成立，导致漫画产业被迫向“儿童娱乐”与“道德教育”靠拢。为反抗这种审查压力，部分漫画家开始自费出版，借拟人动物（Funny Animal）探讨严肃议题。在这一背景下，为了连接创作者而诞生的APA组织，让拟人动物脱离了单纯的象征化，形成了“角色可以是角色本身”的全新认知。</p>
                    <p>真正推动福瑞文化从潜在形态向自觉亚文化过渡的，是1980年第38届世界科幻大会（Worldcon）上的一次偶然分享。当时，美国空军技术插画师 Steve Gallacci 向一小群科幻迷展示了其原创角色 Erma Felna 的插画与设定草稿。这一非正式的概念分享意外引发了持续数年的连锁反应，自发形成了一个高度聚焦的讨论圈——“加拉其小组（Gallacci Group）”。成员们不仅认真研读其关于人工进化动物智慧种族的星际战争设定，甚至在拍卖会上为那幅设定草稿展开竞拍。这种“先于作品的社群意识”，为福瑞文化的凝聚奠定了基础。</p>
                    <p>1984年创刊的《Rowrbrazzle》杂志，则被视为福瑞走向独立亚文化的重要里程碑。它标志着对拟人动物的兴趣不再只是零散的个人偏好，而是形成了能够稳定支持创作、交流与再生产的独立文化实践。</p>
                    <p>随着互联网的发展，福瑞文化逐渐跨越国界。2005年左右，福瑞文化正式传入中国，大陆的兽迷开始集中在百度贴吧的“兽人吧”及相关衍生群中活动。在2005年至2013年间，贴吧及相关群组是兽迷最主要的网络交流枢纽。然而，随着2013年后贴吧颓势渐显，加之2015年下旬遭遇大规模删封波及，这一早期的国内兽迷网络枢纽最终失去了原本的核心地位，福瑞文化也由此进入了新的发展阶段。</p>

                    <p style="font-size:12px;color:#888;"><strong>数据来源：</strong>萌娘百科 <a href="https://mzh.moegirl.org.cn/Furry">Furry</a>、前福瑞Wiki Furry（2025年9月13日版本） <a href="https://zh.wikifur.com/wiki/Furry">Furry</a> <strong>投稿请去m1314434630@163.com</strong></p>

                'zh-tw': `
                    <h1 style="text-align:center;margin-bottom:30px;color:#2c3e50;">福瑞文化的起源</h1>
                    <p>福瑞（Furry），又稱獸迷或獸圈，是指對具有人類智能、雙足步行、穿著服裝等人類屬性的擬人化動物形象感興趣的群體。在英語中，「Furry」一詞最早可追溯至17世紀後期，原意為「覆有毛皮的」。直到20世紀80年代，它才在次文化語境中延伸出擬人動物角色及愛好者的含義，並逐漸成為一種獨特的文化認同。</p>
                    <p>福瑞文化的誕生，與20世紀中葉美國的社會環境及漫畫產業變革息息相關。50年代末至60年代初，美國漫畫雜誌協會（CMAA）及《權威漫畫準則》（CCA）先後成立，導致漫畫產業被迫向「兒童娛樂」與「道德教育」靠攏。為反抗這種審查壓力，部分漫畫家開始自費出版，藉擬人動物（Funny Animal）探討嚴肅議題。在這一背景下，為了連接創作者而誕生的APA組織，讓擬人動物脫離了單純的象徵化，形成了「角色可以是角色本身」的全新認知。</p>
                    <p>真正推動福瑞文化從潛在形態向自覺次文化過渡的，是1980年第38屆世界科幻大會（Worldcon）上的一次偶然分享。當時，美國空軍技術插畫師 Steve Gallacci 向一小群科幻迷展示了其原創角色 Erma Felna 的插畫與設定草稿。這一非正式的概念分享意外引發了持續數年的連鎖反應，自發形成了一個高度聚焦的討論圈——「加拉其小組（Gallacci Group）」。成員們不僅認真研讀其關於人工進化動物智慧種族的星際戰爭設定，甚至在拍賣會上為那幅設定草稿展開競拍。這種「先於作品的社群意識」，為福瑞文化的凝聚奠定了基礎。</p>
                    <p>1984年創刊的《Rowrbrazzle》雜誌，則被視為福瑞走向獨立次文化的重要里程碑。它標誌著對擬人動物的興趣不再只是零散的個人偏好，而是形成了能夠穩定支持創作、交流與再生產的獨立文化實踐。</p>
                    <p>隨著網際網路的發展，福瑞文化逐漸跨越國界。2005年左右，福瑞文化正式傳入中國，大陸的獸迷開始集中在百度貼吧的「獸人吧」及相關衍生群中活動。在2005年至2013年間，貼吧及相關群組是獸迷最主要的網路交流樞紐。然而，隨著2013年後貼吧頹勢漸顯，加之2015年下旬遭遇大規模刪封波及，這一早期的國內獸迷網路樞紐最終失去了原本的核心地位，福瑞文化也由此進入了新的發展階段。</p>
                    <hr style="margin:30px 0;border:none;border-top:1px dashed #ccc;">
                    <p style="font-size:12px;color:#888;"><strong>數據來源：</strong>萌娘百科 <a href="https://mzh.moegirl.org.cn/Furry">Furry</a>、前福瑞Wiki Furry（2025年9月13日版本） <a href="https://zh.wikifur.com/wiki/Furry">Furry</a> <strong>投稿請去m1314434630@163.com</strong></p>

                en: `
                    <h1 style="text-align:center;margin-bottom:30px;color:#2c3e50;">Origins of Furry Culture</h1>
                    <p>Furry, also known as "animal fans" or "furry fandom," refers to a group interested in anthropomorphic animal characters that possess human traits such as intelligence, bipedal walking, and wearing clothing. In English, the term "Furry" can be traced back to the late 17th century, originally meaning "covered with fur." It wasn't until the 1980s that it extended in subcultural contexts to mean anthropomorphic animal characters and their enthusiasts, gradually becoming a distinct cultural identity.</p>
                    <p>The birth of Furry culture is closely related to the social environment and comic industry changes in mid-20th century America. In the late 1950s and early 1960s, the Comics Magazine Association of America (CMAA) and the Comics Code Authority (CCA) were established, forcing the comic industry toward "children's entertainment" and "moral education." To resist this censorship pressure, some cartoonists began self-publishing, using Funny Animals to explore serious issues. In this context, APA organizations emerged to connect creators, allowing anthropomorphic animals to transcend mere symbolism and form a new understanding that "characters can be themselves."</p>
                    <p>The true catalyst that moved Furry culture from potential to self-aware subculture was an accidental sharing at the 38th World Science Fiction Convention (Worldcon) in 1980. U.S. Air Force technical illustrator Steve Gallacci showed a small group of sci-fi fans his original character Erma Felna's illustrations and concept sketches. This informal sharing unexpectedly triggered a chain reaction over several years, spontaneously forming a highly focused discussion circle—the "Gallacci Group." Members not only carefully studied his interstellar war settings about artificially evolved intelligent animal species but even bid on the concept sketch at an auction. This "community consciousness before the work" laid the foundation for Furry culture's cohesion.</p>
                    <p>The magazine <em>Rowrbrazzle</em>, first published in 1984, is regarded as a milestone for Furry becoming an independent subculture. It marked that interest in anthropomorphic animals was no longer just scattered personal preference but had formed an independent cultural practice that could stably support creation, exchange, and reproduction.</p>
                    <p>With the development of the internet, Furry culture gradually crossed borders. Around 2005, Furry culture officially entered China, with mainland animal fans concentrating on Baidu Tieba's "兽人吧" (Orc Bar) and related derivative groups. Between 2005 and 2013, Tieba and related groups were the main online hubs for animal fans. However, as Tieba declined after 2013 and suffered large-scale deletions and bans in late 2015, this early domestic hub lost its core status, and Furry culture entered a new phase of development.</p>
                    <hr style="margin:30px 0;border:none;border-top:1px dashed #ccc;">
                    <p style="font-size:12px;color:#888;"><strong>Sources:</strong> Moegirl Encyclopedia <a href="https://mzh.moegirl.org.cn/Furry">Furry</a>, former Furry Wiki (2025-09-13 version) <a href="https://zh.wikifur.com/wiki/Furry">Furry</a> <strong>Submissions to: m1314434630@163.com</strong></p>
                `
            },

                    <div style="margin-bottom:40px;">
                        <h2 style="color:#27ae60;border-left:5px solid #27ae60;padding-left:15px;">现在的漫画与创作生态</h2>
                        <p style="color:#333;">如今的福瑞文化早已不再局限于早期的设定集，而是衍生出了庞大的产业链。漫画创作是其中的核心载体，题材跨度极大：</p>

                        <p style="color:#333;">福瑞圈内部并非铁板一块，随着群体扩大，关于“什么是真正的福瑞”以及“如何对外展示”的争论从未停止。</p>

                    <div style="margin-bottom:40px;padding-top:20px;border-top:1px dashed #444;">
                        <h2 style="color:#8e44ad;border-left:5px solid #8e44ad;padding-left:15px;">国内政治议题与底线</h2>
                        <p style="color:#333;">在国内语境下，福瑞圈并非脱离现实的“乌托邦”，当亚文化与大是大非发生碰撞时，往往会引发激烈的争议与抵制：</p>

                    <div class="anti-furry-article">
                        <h1>中文反福瑞现象发展史</h1>
                        <div class="intro"><p><strong>中文反福瑞现象</strong>，是指在中国互联网语境下，部分网民及组织针对"福瑞"（Furry，即兽迷/拟人化动物爱好者）亚文化群体，所产生的一系列排斥、污名化及网络暴力事件的总称。该现象自2016年起初露端倪，经历了从媒体误读、圈层内部矛盾外溢，到最终演变为有组织、系统性的网络"猎巫"行动，其演变史反映了边缘亚文化在破圈过程中所面临的严峻舆论环境。</p></div>
                        <h2>1. 2016年：媒体失实报道与舆论"第一枪"</h2>

                        <ul><li><strong>「大牛村」低齡化亂象：</strong>以「大牛村」為代表的事件暴露了當時獸迷圈受眾的極度低齡化。大量心智尚未成熟的小學生及國中生湧入，在缺乏引導的情況下模仿圈內不良風氣，導致公共網路平台出現大量出格行為，為反福瑞群體提供了攻擊的「實錘」。</li><li><strong>《有獸焉》遭遇大型網暴：</strong>2024.10.01，國產知名條漫《有獸焉》遭遇了史無前例的大型網路暴力。反福瑞群體及部分極端網友利用漫畫中的個別爭議點，進行了斷章取義的傳播與惡意解讀，引發了針對作者及作品的大規模謾罵與舉報。這是獸迷相關文化產品首次在主流視野中遭受如此規模的集中攻擊。</li></ul>

                        <ul><li><strong>有組織的「獵巫」行動：</strong>反福瑞群體不再是個體宣洩，而是形成了嚴密的組織架構。他們建立了專門的素材庫與話術群，制定了統一的攻擊計劃，將反福瑞行為演變為一種「網路狂歡」與「爛梗」傳播。</li><li><strong>全網級輿論圍剿：</strong>2023年至今爆發的網暴，其規模、持續時間及破壞力均遠超2018年。反福瑞組織利用平台監管規則的漏洞，對獸迷畫師、獸展主辦方及相關社群進行了無差別的舉報與騷擾。</li><li><strong>性質質變：</strong>此次事件不再局限於對「低俗內容」的批判，而是演變為對整個獸迷群體生存空間的系統性擠壓，試圖透過製造恐慌和汙名化，將獸迷文化徹底驅逐出公共網路平台。</li></ul>

                        <h1>History of the Anti-Furry Phenomenon in China</h1>
                        <div class="intro"><p><strong>The Anti-Furry phenomenon in China</strong> refers to a series of exclusion, stigmatization, and online violence against the "Furry" (i.e., animal fan / anthropomorphic animal enthusiast) subculture by some netizens and organizations in the Chinese internet context. This phenomenon began to emerge around 2016, evolving from media misreading and internal conflicts to organized, systematic online "witch hunts." Its evolution reflects the harsh public opinion environment faced by marginal subcultures when breaking out.</p></div>
                        <h2>1. 2016: Media Misreporting and the "First Shot"</h2>
                        <p>The origin of anti-Furry sentiment can be traced back to 2016. At that time, <em>Southern Metropolis Daily</em> published an in-depth report on the animal fan community. The report contained a critical omission: it stated that "there is underage vulgar pornographic content in the animal fan community" without adding qualifiers like "some" or "a few." This overgeneralization directly equated the gray areas within the subculture with the entire group's characteristics, triggering public sensitivity about "child protection." This report is widely considered the "first shot" of anti-Furry sentiment in the Chinese internet, establishing the logical foundation for subsequent attacks using "moral high ground."</p>
                        <h2>2. 2018: Youth Chaos and the <em>You Shou Yan</em> Cyberbullying</h2>
                        <p>2018 was a key year when anti-Furry sentiment shifted from "conceptual rejection" to "concrete action." Two landmark events occurred, marking that anti-Furry behavior began to target specific cultural works.</p>
                        <ul><li><strong>"Da Niu Cun" youth chaos:</strong> Events like "Da Niu Cun" exposed the extreme youthfulness of the animal fan community at that time. Many primary and junior high school students with immature minds flooded in, imitating bad behaviors without guidance, leading to numerous outrageous actions on public platforms, providing "solid evidence" for anti-Furry groups.</li><li><strong><em>You Shou Yan</em> suffered large-scale cyberbullying:</strong> On October 1, 2024, the well-known domestic webcomic <em>You Shou Yan</em> suffered unprecedented large-scale online violence. Anti-Furry groups and some extreme netizens took individual controversial points out of context and maliciously interpreted them, triggering massive abuse and reports against the author and the work. This was the first time a furry-related cultural product had suffered such concentrated attacks in the mainstream view.</li></ul>
                        <h2>3. 2023: Organized Opposition and the Largest Cyberbullying in History</h2>
                        <p>Entering 2023, anti-Furry behavior fully transformed from "scattered individuals" to "organized groups," and the largest crackdown in history erupted.</p>
                        <ul><li><strong>Organized "witch hunts":</strong> Anti-Furry groups were no longer individual vents but formed tight organizational structures. They established dedicated material libraries and rhetoric groups, formulated unified attack plans, turning anti-Furry behavior into a kind of "internet carnival" and "meme" propagation.</li><li><strong>Full-scale public opinion siege:</strong> The cyberbullying that erupted from 2023 to the present is far larger in scale, duration, and destructiveness than in 2018. Anti-Furry organizations exploited loopholes in platform moderation rules to indiscriminately report and harass furry artists, convention organizers, and related communities.</li><li><strong>Qualitative change:</strong> This event was no longer limited to criticizing "vulgar content" but evolved into systemic suppression of the entire animal fan community's living space, attempting to drive furry culture out of public online platforms through panic and stigmatization.</li></ul>
                        <h2>4. Cause Analysis and Sociological Perspectives</h2>
                        <p>Overall, the outbreak of the anti-Furry phenomenon in China is not due to a single factor but the superposition of multiple contradictions:</p>
                        <ul><li><strong>Internal factors:</strong> Low entry thresholds led to extreme youthfulness of the audience; some immature users posted extreme remarks or borderline behaviors, and a few bad actors used the community to vent excessive desires, providing direct handles for external attacks.</li><li><strong>External factors:</strong> With the popularization of social media, Furry culture moved from closed fan groups to the public eye. The public often cannot distinguish "normal enthusiasts" from "bad actors," leading to availability heuristic and group attribution errors, equating a tiny minority with the entire community.</li><li><strong>Psychological mechanisms:</strong> Some anti-Furry behavior is essentially a variant of cyberbullying. Perpetrators find a relatively vulnerable subculture as a "scapegoat" (the "black sheep effect"), bully the weak (the "kick the cat" effect), and escalate with impunity (the "broken windows" effect), thus releasing real-life stress or gaining a sense of group belonging.</li></ul>
                        <h2>5. 2025–2026: Targeted Malicious Smear and Cyber Violence</h2>
                        <h3>5.1 Event Overview</h3>
                        <p>From November 2025 to early 2026, the Chinese internet witnessed an organized, large-scale malicious attack against the Furry (animal fan) community. This was not a simple subcultural conflict but a media storm jointly driven by <strong>fake furries (Fauxurry)</strong>, <strong>extreme anti-furry groups (Anti-Furry)</strong>, and <strong>profit-driven "reviewer" accounts (the critique circle)</strong>. Attackers used extreme tactics such as forging chat logs, stealing fursonas to alter the national anthem, spreading rumors about public safety incidents, and insulting veterans, aiming to stigmatize and criminalize the furry community. Although some clarifications emerged later, the event caused deep and lasting damage to the community.</p>

                        <p><strong>Late November – Early December 2025: Rumors and Cinema Controversy</strong></p>
                        <ul><li><strong>Cinema "self-pleasure" rumor:</strong> Taking advantage of the release of <em>Zootopia 2</em>, fake-furry groups forged QQ chat logs claiming that "a furry masturbated in the cinema and got it on someone else's head." Investigation revealed that the images used had already circulated before the movie's release (November 5), with obvious timeline and background inconsistencies—confirmed as <strong>fabricated framing</strong>.</li><li><strong>Smear of furry group screening:</strong> On November 28, the Singularity Furry Convention organized a private screening of <em>Zootopia 2</em>. Some trolls took clips out of context, hiding the fact that it was a private event, and falsely claimed furries were "occupying the theater, causing bad smells, and disturbing other moviegoers," triggering online abuse against attendees.</li></ul>
                        <p><strong>December 2025: Full-Scale War and Crossing the Red Line</strong></p>
                        <ul><li><strong>Baidu Tieba "dark humor" baiting:</strong> On November 30, the account “青春大萎” posted in the "Dark Humor" subforum claiming "furry parents in fursuits scared children," and deliberately mentioned "veteran" status to inflame tensions. The post was later spread by troll groups and appeared twice on Tieba's trending list.</li><li><strong>QQ group bombing attacks:</strong> From December 4, unidentified individuals used fake accounts disguised as furries or fans of Pokémon/Plants vs. Zombies to infiltrate groups and send politically sensitive, pornographic, or violent images to get groups banned, forcing many normal communities to disband or enforce strict verification.</li><li><strong>Bus "spraying unknown liquid" rumor:</strong> On December 7, anti-furry groups claimed they would "spray an unknown yellow liquid on Shanghai buses for bus fans to smell." This rumor spread to the transit community. Investigations showed that the bus in the image was <strong>from a pre-2015 old livery</strong>, and the model had been scrapped in 2023, with interior details inconsistent with the description—confirmed as <strong>using old photos to spread falsehoods</strong>.</li></ul>

                        <h3>5.3 In-Depth Analysis of Attack Methods</h3>
                        <p>In this incident, attackers demonstrated a high level of organization and despicable tactics, mainly including:</p>
                        <p><strong>5.3.1 Political Smear (Red-Line Attacks)</strong></p>
                        <ul><li><strong>Methods:</strong> Stealing fursonas to alter the national anthem, posting anti-party/anti-social comments in groups and leaking screenshots, insulting veterans.</li><li><strong>Purpose:</strong> Using public patriotism and respect for the military to link furries with "endangering national security" and "insulting heroes," leveraging official and public forces to attack.</li><li><strong>Typical cases:</strong> <a href="https://space.bilibili.com/1821394281" target="_blank">@浩气长存逍遥自在</a> (national anthem alteration) and "Qilin Da" (insulting veterans).</li></ul>
                        <p><strong>5.3.2 Social Death (Sexual Rumors and Panic)</strong></p>

                        <p><strong>5.3.3 Technical Disruption (Group Bombing and Account Theft)</strong></p>
                        <ul><li><strong>Methods:</strong> Mass-registering fake accounts, infiltrating groups, and sending violating content to get groups banned.</li><li><strong>Impact:</strong> Directly destroyed the communication infrastructure of furry communities, causing many innocent groups to disband.</li></ul>

                const key = el.id;
                if (TEXTS[key]) el.textContent = TEXTS[key][lang];

            document.getElementById('home-title').textContent = TEXTS['home-title'][lang];
            document.getElementById('tab-comic').innerHTML = TEXTS['tab-comic'][lang];
            document.getElementById('tab-game').innerHTML = TEXTS['tab-game'][lang];
            document.getElementById('calendar-title').textContent = TEXTS['calendar-title'][lang];
            document.getElementById('calendar-sub').textContent = TEXTS['calendar-sub'][lang];

            document.getElementById('intro-container').innerHTML = TEXTS['intro-text'][lang];
            document.getElementById('history-content').innerHTML = TEXTS['history-text'][lang];
            document.getElementById('status-content').innerHTML = TEXTS['status-text'][lang];
            document.getElementById('oldwiki-content').innerHTML = TEXTS['oldwiki-text'][lang];
            document.getElementById('tv-content').innerHTML = TEXTS['tv-text'][lang];

            renderRanking(lang);
            renderComicCards(lang);
            renderGameCards(lang);
            const activeMonth = document.querySelector('.month-btn.active');
            if (activeMonth) {
                const m = activeMonth.textContent.replace('月','');
                showMonth(m);
            }
            localStorage.setItem('furrywiki-lang', lang);
        }

        function renderComicCards(lang) {
            const container = document.getElementById('works-comic');
            const cards = COMIC_CARDS[lang] || COMIC_CARDS.zh;
            let header = '', sub = '';
            if (lang === 'zh') { header = '精选福瑞漫画与动画'; sub = '收录圈内知名作品，感受兽设的魅力'; }
            else if (lang === 'zh-tw') { header = '精選福瑞漫畫與動畫'; sub = '收錄圈內知名作品，感受獸設的魅力'; }
            else { header = 'Featured Furry Comics & Animation'; sub = 'A selection of well-known works in the fandom, feel the charm of fursonas.'; }
            let html = `<h2 style="text-align:center;color:#333;">${header}</h2><p style="text-align:center;color:#666;">${sub}</p><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:20px;">`;
            cards.forEach(c => {
                html += `<div style="width:200px;background:white;padding:15px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);text-align:center;"><h3 style="margin:10px 0;font-size:18px;"><a href="${c.link}" style="color:#00a1d6;text-decoration:none;" target="_blank">${c.title}</a></h3><p style="font-size:14px;color:#555;">${c.desc}</p><p style="font-size:12px;color:#999;">${c.author}</p></div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        // ================================================================
        // 修改后的 showMonth 函数（支持日期多语言）
        // ================================================================
        function showMonth(month) {
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.month-btn[onclick*="${month}"]`);
            if (activeBtn) activeBtn.classList.add('active');

            let html = '<ul class="con-list">';
            if (conData[month] && conData[month].length > 0) {
                conData[month].forEach(con => {
                    let dateDisplay = con.date;
                    // 处理“暂时未公开”的多语言显示
                    if (con.date === "暂时未公开") {
                        if (currentLang === 'en') dateDisplay = 'TBA';
                        else if (currentLang === 'zh-tw') dateDisplay = '暫時未公開';
                        // 简体中文保持原样
                    }
                    html += `<li><span class="con-date">${dateDisplay}</span><span>${con.name}</span></li>`;
                });
            } else {
                const msg = currentLang === 'zh' ? '暂无展会安排' : (currentLang === 'zh-tw' ? '暫無展會安排' : 'No conventions scheduled');
                html = `<p style="text-align:center;color:#999;">${msg}</p>`;
            }
            html += '</ul>';
            document.getElementById('calendar-content').innerHTML = html;
        }

        // ================================================================
        // 其他功能（平滑滚动、选项卡等）
        // ================================================================
        function switchWorksTab(tab) {
            document.querySelectorAll('.works-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.works-tab').forEach(btn => btn.classList.remove('active'));
            if (tab === 'comic') {
                document.getElementById('works-comic').style.display = 'block';
                document.getElementById('tab-comic').classList.add('active');
            } else {
                document.getElementById('works-game').style.display = 'block';
                document.getElementById('tab-game').classList.add('active');
            }
        }

        document.querySelectorAll('nav a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && href !== '#') {
                    const target = document.querySelector(href);
                    if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth' }); }
                } else if (href === '#') {
                    e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        });

        window.onload = function() {
            const saved = localStorage.getItem('furrywiki-lang') || 'zh';
            switchLang(saved);
            showMonth('jun');
            switchWorksTab('comic');
